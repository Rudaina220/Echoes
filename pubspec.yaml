name: echoes
description: A local memory journaling app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7


  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  image_picker: ^1.1.2

  geolocator: ^12.0.0

  flutter_sound: ^9.2.13
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1

  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.1


  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^10.1.4

  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  intl: ^0.19.0

  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.28.0

  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/


flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21